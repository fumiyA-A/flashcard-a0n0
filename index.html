<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flashcard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4 overflow-hidden">

    <div id="start-screen" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center max-h-[95vh] overflow-y-auto relative">
        <button onclick="showOptions()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
        </button>

        <h1 class="text-3xl font-bold text-gray-800 mb-2 mt-2">TOEIC 900 Master</h1>
        <p class="text-sm text-gray-500 mb-6">10 Days Strategic Learning</p>

        <div class="mb-8 text-left bg-blue-50 p-5 rounded-lg shadow-inner">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-xs font-bold text-blue-500 uppercase tracking-wider" id="dash-mode-title">モード</h3>
                <span id="dash-range-title" class="text-[10px] font-bold bg-blue-200 text-blue-700 px-2 py-0.5 rounded-full">範囲: 選択中</span>
            </div>
            
            <div class="flex justify-between items-end mb-3 border-b border-blue-100 pb-2">
                <span class="text-sm text-gray-600 font-bold mb-0.5">覚えた！:</span>
                <span id="stat-memo" class="font-bold text-green-600 text-3xl leading-none">-</span>
            </div>
            <div class="flex justify-between items-end">
                <span class="text-sm text-gray-600 font-bold mb-0.5">要復習:</span>
                <span id="stat-wrong" class="font-bold text-red-500 text-3xl leading-none">-</span>
            </div>
        </div>

        <div class="space-y-4">
            <button onclick="startStudy('all')" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-md active:bg-blue-700 transition-colors text-lg">
                学習を開始
            </button>
            <button onclick="startStudy('wrong')" id="btn-wrong" class="w-full bg-red-500 text-white py-4 rounded-xl font-bold shadow-md active:bg-red-600 transition-colors text-lg">
                要復習のみ開始
            </button>
            <button onclick="openHistory()" class="w-full bg-gray-100 text-gray-600 py-3 rounded-xl font-bold active:bg-gray-200 transition-colors mt-2">
                履歴を確認
            </button>
        </div>
    </div>

    <div id="options-screen" class="bg-white p-6 rounded-xl shadow-lg w-full max-w-md hidden flex flex-col h-[85vh]">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-3 text-center">オプション設定</h2>
        
        <div class="flex-1 overflow-y-auto pr-2 custom-scrollbar">
            <div class="mb-6">
                <h3 class="text-sm font-bold text-gray-700 mb-3 pl-2 border-l-4 border-green-500">出題範囲（複数選択可）</h3>
                <div class="grid grid-cols-2 gap-2">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-green-50 transition-colors">
                        <input type="checkbox" name="range" value="1" class="w-4 h-4 text-green-600 rounded">
                        <span class="ml-2 text-sm font-medium text-gray-700">ID 1 - 100</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-green-50 transition-colors">
                        <input type="checkbox" name="range" value="2" class="w-4 h-4 text-green-600 rounded">
                        <span class="ml-2 text-sm font-medium text-gray-700">ID 101 - 200</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-green-50 transition-colors">
                        <input type="checkbox" name="range" value="3" class="w-4 h-4 text-green-600 rounded">
                        <span class="ml-2 text-sm font-medium text-gray-700">ID 201 - 300</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-green-50 transition-colors">
                        <input type="checkbox" name="range" value="4" class="w-4 h-4 text-green-600 rounded">
                        <span class="ml-2 text-sm font-medium text-gray-700">ID 301 - 400</span>
                    </label>
                </div>
            </div>

            <div class="mb-6 border-t pt-4 border-gray-100">
                <h3 class="text-sm font-bold text-gray-700 mb-3 pl-2 border-l-4 border-blue-500">出題形式</h3>
                <div class="grid grid-cols-1 gap-2">
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-blue-50 transition-colors">
                        <input type="radio" name="format" value="EPh-JPh" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-sm font-medium text-gray-700">英語フレーズ → 日本語</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-blue-50 transition-colors">
                        <input type="radio" name="format" value="JPh-EPh" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-sm font-medium text-gray-700">日本語フレーズ → 英語</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-blue-50 transition-colors">
                        <input type="radio" name="format" value="EWd-JWd" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-sm font-medium text-gray-700">英単語 → 日本語訳</span>
                    </label>
                    <label class="flex items-center p-3 bg-gray-50 rounded-lg border cursor-pointer hover:bg-blue-50 transition-colors">
                        <input type="radio" name="format" value="JWd-EWd" class="w-4 h-4 text-blue-600">
                        <span class="ml-3 text-sm font-medium text-gray-700">日本語訳 → 英単語</span>
                    </label>
                </div>
            </div>

            <div class="mb-2 pt-4 border-t border-gray-200 text-center">
                <button onclick="resetData()" class="text-sm text-red-400 font-bold hover:text-red-600 transition-colors">すべての学習記録を消去する</button>
            </div>
        </div>

        <div class="mt-4 pt-4 border-t border-gray-200">
            <button onclick="saveOptionsAndClose()" class="w-full bg-gray-800 text-white py-3 rounded-lg font-bold shadow-md active:bg-gray-900 transition-colors">
                保存して戻る
            </button>
        </div>
    </div>

    <div id="flashcard-screen" class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center hidden flex flex-col h-[85vh]">
        <h2 class="text-gray-500 text-xs mb-4" id="progress">- / -</h2>
        
        <div id="card" class="bg-blue-50 cursor-pointer p-8 rounded-lg flex-1 flex flex-col items-center justify-center transition-all duration-300" onclick="flipCard()">
            <div id="card-front" class="w-full">
                <p id="label-front" class="text-[10px] uppercase tracking-widest text-blue-400 mb-2 font-bold">FRONT</p>
                <h1 id="text-front" class="text-2xl font-bold text-gray-800 break-words leading-relaxed">読み込み中...</h1>
            </div>
            
            <div id="card-back" class="w-full mt-6 pt-6 border-t border-blue-100 hidden">
                <p id="label-back" class="text-[10px] uppercase tracking-widest text-green-400 mb-2 font-bold">BACK</p>
                <h1 id="text-back" class="text-xl font-bold text-blue-600 break-words leading-relaxed">意味</h1>
                <p id="sub-info" class="text-xs text-gray-400 mt-4 italic">補助情報</p>
            </div>
        </div>

        <div id="buttons" class="mt-6 flex justify-between gap-4 hidden">
            <button onclick="recordAnswer(false)" class="bg-red-500 text-white flex-1 py-4 rounded-xl font-bold shadow-lg text-lg">✕</button>
            <button onclick="recordAnswer(true)" class="bg-green-500 text-white flex-1 py-4 rounded-xl font-bold shadow-lg text-lg">✓</button>
        </div>
        
        <button onclick="backToStart()" class="mt-6 text-sm text-gray-400 underline font-bold">← 中断して戻る</button>
    </div>

    <div id="history-screen" class="bg-white p-4 rounded-xl shadow-lg w-full max-w-md hidden flex flex-col h-[90vh]">
        <h2 class="text-lg font-bold text-gray-800 mb-3 text-center">学習履歴と正答率</h2>
        
        <div class="flex border-b border-gray-200 mb-4 bg-gray-50 rounded-t-lg">
            <button onclick="switchHistoryTab('EPh-JPh')" id="tab-EPh-JPh" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-blue-600 text-blue-600 transition-colors">英フ→日</button>
            <button onclick="switchHistoryTab('JPh-EPh')" id="tab-JPh-EPh" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-gray-400 transition-colors">日フ→英</button>
            <button onclick="switchHistoryTab('EWd-JWd')" id="tab-EWd-JWd" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-gray-400 transition-colors">英単→日</button>
            <button onclick="switchHistoryTab('JWd-EWd')" id="tab-JWd-EWd" class="flex-1 py-2 text-[10px] font-bold border-b-2 border-transparent text-gray-400 transition-colors">日単→英</button>
        </div>

        <div id="history-list" class="overflow-y-auto flex-1 space-y-3 pr-1 custom-scrollbar"></div>
        
        <button onclick="backToStartFromHistory()" class="mt-4 pt-3 border-t text-sm text-gray-500 underline font-bold text-center">← 戻る</button>
    </div>

    <script>
        let vocabData = [];
        let activeVocab = [];
        let currentIndex = 0;
        let isFlipped = false;
        
        let currentFormat = localStorage.getItem('flashcard_format') || "EPh-JPh";
        let selectedRanges = JSON.parse(localStorage.getItem('flashcard_ranges')) || [1, 2, 3, 4];
        let historyTab = currentFormat;

        let userProgress = JSON.parse(localStorage.getItem('flashcard_progress_v2')) || {};

        const modeNames = {
            'EPh-JPh': '英語フレーズ → 日本語',
            'JPh-EPh': '日本語フレーズ → 英語',
            'EWd-JWd': '英単語 → 日本語訳',
            'JWd-EWd': '日本語訳 → 英単語'
        };

        Papa.parse("data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                vocabData = results.data.filter(v => v['ID'] && v['文中の英単語'] && v['文中の日本語']);
                updateStartScreen();
            }
        });

        function isVocabInRange(vocab) {
            const id = parseInt(vocab.ID, 10);
            if (isNaN(id)) return false;
            if (selectedRanges.includes(1) && id >= 1 && id <= 100) return true;
            if (selectedRanges.includes(2) && id >= 101 && id <= 200) return true;
            if (selectedRanges.includes(3) && id >= 201 && id <= 300) return true;
            if (selectedRanges.includes(4) && id >= 301) return true;
            return false;
        }

        function updateStartScreen() {
            let memoCount = 0;
            let wrongCount = 0;
            const targetVocab = vocabData.filter(isVocabInRange);
            const total = targetVocab.length;

            document.getElementById('dash-mode-title').innerText = modeNames[currentFormat];
            
            let rangeText = "";
            if(selectedRanges.length === 4) rangeText = "全範囲 (1-400)";
            else rangeText = selectedRanges.map(r => `[${r}]`).join(", ") + " ブロック";
            document.getElementById('dash-range-title').innerText = rangeText;

            targetVocab.forEach(v => {
                const record = userProgress[v.ID]?.[currentFormat];
                if (record?.status === 'memorized') memoCount++;
                else if (record?.status === 'wrong') wrongCount++;
            });
            
            document.getElementById('stat-memo').innerHTML = `${memoCount} <span class="text-sm font-normal text-gray-400 ml-1">/ ${total}</span>`;
            document.getElementById('stat-wrong').innerHTML = `${wrongCount} <span class="text-sm font-normal text-gray-400 ml-1">/ ${total}</span>`;
            
            const btnWrong = document.getElementById('btn-wrong');
            btnWrong.disabled = (wrongCount === 0);
            btnWrong.style.opacity = (wrongCount === 0) ? "0.5" : "1";
        }

        function loadOptionSettings() {
            const radios = document.getElementsByName('format');
            for(let i = 0; i < radios.length; i++) {
                if(radios[i].value === currentFormat) radios[i].checked = true;
            }
            const checkboxes = document.getElementsByName('range');
            for(let i = 0; i < checkboxes.length; i++) {
                checkboxes[i].checked = selectedRanges.includes(parseInt(checkboxes[i].value, 10));
            }
        }

        function showOptions() {
            loadOptionSettings();
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('options-screen').classList.remove('hidden');
        }

        function saveOptionsAndClose() {
            const checkboxes = document.getElementsByName('range');
            let newRanges = [];
            for(let i = 0; i < checkboxes.length; i++) {
                if (checkboxes[i].checked) newRanges.push(parseInt(checkboxes[i].value, 10));
            }
            if (newRanges.length === 0) return alert("出題範囲を少なくとも1つ選択してください。");
            
            selectedRanges = newRanges;
            localStorage.setItem('flashcard_ranges', JSON.stringify(selectedRanges));
            currentFormat = document.querySelector('input[name="format"]:checked').value;
            localStorage.setItem('flashcard_format', currentFormat);
            
            updateStartScreen();
            document.getElementById('options-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function startStudy(mode) {
            const targetVocab = vocabData.filter(isVocabInRange);
            if (mode === 'wrong') {
                activeVocab = targetVocab.filter(v => userProgress[v.ID]?.[currentFormat]?.status === 'wrong');
            } else {
                activeVocab = targetVocab.filter(v => userProgress[v.ID]?.[currentFormat]?.status !== 'memorized');
            }

            if (activeVocab.length === 0) return alert("この範囲には学習するカードがありません。");

            activeVocab.sort(() => Math.random() - 0.5);
            currentIndex = 0;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('flashcard-screen').classList.remove('hidden');
            loadCard();
        }

        function highlightExact(fullText, exactTargetWord) {
            if (!fullText || !exactTargetWord) return fullText;
            const escaped = exactTargetWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            return fullText.replace(regex, `<span class="underline decoration-2 decoration-blue-400">$1</span>`);
        }

        // ==========================================
        // ★新規追加：ヒント用の伏せ字を生成する関数
        // ==========================================
        function getHintPhrase(fullText, targetWord) {
            if (!fullText || !targetWord) return fullText;
            const escaped = targetWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const regex = new RegExp(`(${escaped})`, 'gi');
            
            // 対象単語の頭文字だけ残して、文字数-1個のハイフンにする
            return fullText.replace(regex, (match) => {
                if (match.length <= 1) return match;
                return match.charAt(0) + '-'.repeat(match.length - 1);
            });
        }

        function loadCard() {
            if (activeVocab.length === 0) {
                document.getElementById('card').innerHTML = '<h1 class="text-2xl font-bold text-green-600 mb-2">Session Clear!🎉</h1><p class="text-gray-600 text-sm">お疲れ様でした。</p>';
                document.getElementById('buttons').classList.add('hidden');
                return;
            }

            const v = activeVocab[currentIndex];
            const frontEl = document.getElementById('text-front');
            const backEl = document.getElementById('text-back');
            const subEl = document.getElementById('sub-info');

            switch(currentFormat) {
                case 'EPh-JPh':
                    frontEl.innerHTML = highlightExact(v['フレーズ(英語)'], v['文中の英単語']);
                    backEl.innerHTML = highlightExact(v['フレーズ(日本語)'], v['文中の日本語']);
                    break;
                case 'JPh-EPh':
                    // ★ 修正：表面は日本語（下線なし）＋英語のヒント、裏面は英語（下線あり）
                    const hintPhrase = getHintPhrase(v['フレーズ(英語)'], v['文中の英単語']);
                    frontEl.innerHTML = `${v['フレーズ(日本語)']}<br><span class="text-lg text-gray-400 font-normal mt-4 block tracking-widest">${hintPhrase}</span>`;
                    backEl.innerHTML = highlightExact(v['フレーズ(英語)'], v['文中の英単語']);
                    break;
                case 'EWd-JWd':
                    frontEl.innerText = v['英単語'];
                    backEl.innerText = v['日本語訳'];
                    break;
                case 'JWd-EWd':
                    frontEl.innerText = v['日本語訳'];
                    backEl.innerText = v['英単語'];
                    break;
            }

            subEl.innerText = `ID:${v['ID']} | ${v['英単語']} | ${v['日本語訳']} | ${v['品詞']}`;
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${activeVocab.length}`;
            
            document.getElementById('card-back').classList.add('hidden');
            document.getElementById('buttons').classList.add('hidden');
            isFlipped = false;
        }

        function flipCard() {
            if (isFlipped) return;
            document.getElementById('card-back').classList.remove('hidden');
            document.getElementById('buttons').classList.remove('hidden');
            isFlipped = true;
        }

        function recordAnswer(isCorrect) {
            const v = activeVocab[currentIndex];
            const now = new Date().toISOString();
            
            if (!userProgress[v.ID]) userProgress[v.ID] = {};
            const prevData = userProgress[v.ID][currentFormat] || { correct_count: 0, total_count: 0 };
            
            userProgress[v.ID][currentFormat] = { 
                status: isCorrect ? 'memorized' : 'wrong', 
                correct_count: prevData.correct_count + (isCorrect ? 1 : 0),
                total_count: prevData.total_count + 1,
                last_date: now 
            };
            
            localStorage.setItem('flashcard_progress_v2', JSON.stringify(userProgress));

            if (isCorrect) activeVocab.splice(currentIndex, 1);
            else currentIndex++;

            if (currentIndex >= activeVocab.length) currentIndex = 0;
            loadCard();
        }

        function backToStart() {
            updateStartScreen();
            document.getElementById('flashcard-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function openHistory() {
            historyTab = currentFormat; 
            switchHistoryTab(historyTab);
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('history-screen').classList.remove('hidden');
        }

        function switchHistoryTab(tabName) {
            historyTab = tabName;
            const tabs = ['EPh-JPh', 'JPh-EPh', 'EWd-JWd', 'JWd-EWd'];
            tabs.forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (t === tabName) {
                    el.classList.remove('border-transparent', 'text-gray-400');
                    el.classList.add('border-blue-600', 'text-blue-600');
                } else {
                    el.classList.add('border-transparent', 'text-gray-400');
                    el.classList.remove('border-blue-600', 'text-blue-600');
                }
            });
            renderHistoryList();
        }

        function renderHistoryList() {
            const list = document.getElementById('history-list');
            list.innerHTML = '';
            
            const targetVocab = vocabData.filter(isVocabInRange);
            const history = targetVocab
                .filter(v => userProgress[v.ID] && userProgress[v.ID][historyTab])
                .sort((a,b) => new Date(userProgress[b.ID][historyTab].last_date) - new Date(userProgress[a.ID][historyTab].last_date));
            
            if(history.length === 0) {
                list.innerHTML = '<p class="text-center text-gray-400 mt-10 text-sm">この範囲・モードの履歴はありません</p>';
                return;
            }
            
            history.forEach(v => {
                const record = userProgress[v.ID][historyTab];
                const isWrong = record.status === 'wrong';
                
                let frontText = "", backText = "";
                switch(historyTab) {
                    case 'EPh-JPh': frontText = highlightExact(v['フレーズ(英語)'], v['文中の英単語']); backText = v['フレーズ(日本語)']; break;
                    // ★修正：履歴画面も、表面は日本語そのまま、裏面は英語（下線あり）に合わせる
                    case 'JPh-EPh': frontText = v['フレーズ(日本語)']; backText = highlightExact(v['フレーズ(英語)'], v['文中の英単語']); break;
                    case 'EWd-JWd': frontText = v['英単語']; backText = v['日本語訳']; break;
                    case 'JWd-EWd': frontText = v['日本語訳']; backText = v['英単語']; break;
                }

                const accRate = Math.round((record.correct_count / record.total_count) * 100);
                const accColor = accRate >= 80 ? 'text-green-600 bg-green-100' : (accRate < 50 ? 'text-red-600 bg-red-100' : 'text-blue-600 bg-blue-100');

                list.innerHTML += `
                    <div class="p-3 bg-white border shadow-sm rounded-lg text-left ${isWrong ? 'border-red-300' : 'border-gray-200'}">
                        <div class="flex justify-between items-center mb-2 border-b border-gray-100 pb-1">
                            <span class="text-[10px] font-bold ${isWrong ? 'text-red-500' : 'text-green-600'}">${isWrong ? '要復習' : '習得'}</span>
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded-full ${accColor}">正答率: ${record.correct_count}/${record.total_count}回 (${accRate}%)</span>
                        </div>
                        <p class="text-sm font-bold text-gray-800 leading-tight mb-1">${frontText}</p>
                        <p class="text-xs text-gray-500">${backText}</p>
                    </div>`;
            });
        }

        function backToStartFromHistory() {
            document.getElementById('history-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function resetData() {
            if(confirm("全記録を消去しますか？")) { 
                localStorage.removeItem('flashcard_progress_v2'); 
                location.reload(); 
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
