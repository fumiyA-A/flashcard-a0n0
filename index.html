<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flashcard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">
        <h2 class="text-gray-500 text-sm mb-2" id="progress">- / -</h2>
        
        <div id="card" class="bg-blue-50 cursor-pointer p-10 rounded-lg min-h-[200px] flex flex-col items-center justify-center transition-all duration-300" onclick="flipCard()">
            <h1 id="word" class="text-2xl font-bold text-gray-800">CSV読み込み中...</h1>
            <p id="meaning" class="text-xl text-blue-600 mt-4 hidden">意味</p>
            <p id="sub-info" class="text-xs text-gray-400 mt-6 hidden">補助情報</p>
        </div>

        <div id="buttons" class="mt-8 flex justify-between gap-4 hidden">
            <button onclick="recordAnswer(false)" class="bg-red-500 text-white flex-1 py-3 rounded-lg font-bold shadow-md active:bg-red-600 transition-colors">間違えた</button>
            <button onclick="recordAnswer(true)" class="bg-green-500 text-white flex-1 py-3 rounded-lg font-bold shadow-md active:bg-green-600 transition-colors">覚えた！</button>
        </div>
        
        <div class="mt-4">
            <button onclick="resetData()" class="text-sm text-gray-400 underline">学習データをリセット</button>
        </div>
    </div>

    <script>
        let vocabData = [];
        let activeVocab = [];
        let currentIndex = 0;
        let isFlipped = false;

        // localStorageから学習履歴を読み込む
        let userProgress = JSON.parse(localStorage.getItem('flashcard_progress')) || {};

        // アプリ起動時に data.csv を読み込む処理
        Papa.parse("data.csv", {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                vocabData = results.data;
                
                // モード選択
                const isSecondRound = confirm("2周目（不正解だったカードのみ）を開始しますか？\n(キャンセルで全件学習)");

                if (isSecondRound) {
                    activeVocab = vocabData.filter(v => 
                        userProgress[v.ID] && userProgress[v.ID].status === 'wrong'
                    );
                } else {
                    activeVocab = vocabData.filter(v => 
                        !userProgress[v.ID] || userProgress[v.ID].status !== 'memorized'
                    );
                }
                
                // フレーズが空欄のデータを除外
                activeVocab = activeVocab.filter(v => v['フレーズ(英語)'] && v['フレーズ(日本語)']);

                loadCard(); // 最初のカードを表示
            },
            error: function(err) {
                document.getElementById('word').innerText = "エラー";
                document.getElementById('meaning').innerText = "data.csv の読み込みに失敗しました。";
                document.getElementById('meaning').classList.remove('hidden');
            }
        });

        // ★★★ 強調処理用のヘルパー関数（ここを追加） ★★★
        function getHighlighedText(rawPhrase, targetWord, colorClass = "decoration-blue-500") {
            if (!rawPhrase || !targetWord) return rawPhrase;

            // 特殊文字をエスケープ（Regexでのエラー防止）
            const escapedWord = targetWord.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

            // 英語の場合：単語境界(\b)を意識した正規表現
            if (rawPhrase.match(/[a-zA-Z]/)) {
                const regexEng = new RegExp(`\\b(${escapedWord})\\b`, 'gi');
                // 下線を引く（Tailwindのunderlineクラスを使用）
                if (rawPhrase.match(regexEng)) {
                    return rawPhrase.replace(regexEng, `<span class="underline ${colorClass}">$1</span>`);
                }
            }
            
            // 日本語の場合：単純な置換を試みる
            if (rawPhrase.includes(targetWord)) {
                // 完全一致する場合のみ下線を引く
                const regexJp = new RegExp(`(${escapedWord})`, 'g');
                return rawPhrase.replace(regexJp, `<span class="underline ${colorClass}">$1</span>`);
            }

            // 一致しなかった場合は元のテキストをそのまま返す
            return rawPhrase;
        }

        function loadCard() {
            if (activeVocab.length === 0) {
                document.getElementById('card').innerHTML = '<h1 class="text-2xl font-bold text-green-600">全問クリア！🎉</h1><p class="mt-4 text-gray-600">素晴らしいペースです！</p>';
                document.getElementById('buttons').classList.add('hidden');
                document.getElementById('progress').innerText = "完了";
                return;
            }

            const currentVocab = activeVocab[currentIndex];
            
            // Rawデータを取得
            const rawEngPhrase = currentVocab['フレーズ(英語)'];
            const targetEngWord = currentVocab['英単語'];
            const rawJpPhrase = currentVocab['フレーズ(日本語)'];
            const targetJpWord = currentVocab['日本語訳'];

            // ==========================================================
            // ★ここが修正ポイント：強調処理をして innerHTML に流し込む
            // ==========================================================
            
            // ① 表面 (英語フレーズ) の強調処理
            document.getElementById('word').innerHTML = getHighlighedText(rawEngPhrase, targetEngWord, "decoration-gray-800");
            
            // ② 裏面 (日本語フレーズ) の強調処理
            //    ※品詞によってはCSVの「日本語訳」がフレーズと一致しない場合（活用など）があるため、
            //    一致したときだけ下線を引くように関数内で制御しています。
            document.getElementById('meaning').innerHTML = getHighlighedText(rawJpPhrase, targetJpWord, "decoration-blue-600");
            
            // ③ 補助情報 (ここはそのまま)
            document.getElementById('sub-info').innerText = `${currentVocab['英単語']} (${currentVocab['品詞']}): ${currentVocab['日本語訳']}`;
            
            // ==========================================================
            
            document.getElementById('progress').innerText = `${currentIndex + 1} / ${activeVocab.length}`;
            
            // 裏面とボタン、補助情報を隠す
            document.getElementById('meaning').classList.add('hidden');
            document.getElementById('sub-info').classList.add('hidden');
            document.getElementById('buttons').classList.add('hidden');
            isFlipped = false;
        }

        function flipCard() {
            if (isFlipped || activeVocab.length === 0) return;
            document.getElementById('meaning').classList.remove('hidden');
            document.getElementById('sub-info').classList.remove('hidden');
            document.getElementById('buttons').classList.remove('hidden');
            isFlipped = true;
        }

        function recordAnswer(isCorrect) {
            const currentVocab = activeVocab[currentIndex];
            const now = new Date().toISOString(); // 時刻を記録

            // 学習履歴データの構造を強化
            userProgress[currentVocab.ID] = {
                status: isCorrect ? 'memorized' : 'wrong',
                last_date: now
            };
            localStorage.setItem('flashcard_progress', JSON.stringify(userProgress));

            if (isCorrect) {
                activeVocab.splice(currentIndex, 1);
            } else {
                currentIndex++;
            }

            if (currentIndex >= activeVocab.length) currentIndex = 0;
            
            loadCard();
        }

        function resetData() {
            if(confirm("本当に学習記録をリセットして最初からやり直しますか？")) {
                localStorage.removeItem('flashcard_progress');
                location.reload();
            }
        }
    </script>
</body>
</html>
